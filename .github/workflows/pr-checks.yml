name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Type-check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx turbo type-check
      - run: npx turbo lint
      - run: npx turbo test
